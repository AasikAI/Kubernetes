apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: cazzzzz/java-app:1.0
          envFrom:
            - configMapRef:
                name: config
          ports:
          - containerPort: 8080
