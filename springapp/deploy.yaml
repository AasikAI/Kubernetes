apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-deploy
  labels:
    app: spring-label
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spring-label
  template:
    metadata:
      labels:
        app: spring-label
    spec:
      containers:
      - name: spring
        image: aasiks/springimage:spring
        envFrom:
          - configMapRef:
              name: config
          - secretRef:
              name: db-secret
        ports:
        - containerPort: 8080
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
